{{ define "main" }}
<link rel="stylesheet" href="/css/antron.css">
<article>
  <header class="antron-page-hero">
    <div class="antron-wrap">
      <p class="antron-eyebrow">Antron Tech</p>
      <h1>{{ .Title }}</h1>
    </div>
  </header>
  <div class="antron-page-body antron-wrap">
    <div class="antron-page-content prose dark:prose-invert">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
